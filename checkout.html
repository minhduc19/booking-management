<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout Schedule</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #181818;
      --border: #2a2a2a;
      --accent: #c8f04a;
      --accent-dim: #8aaa2a;
      --text: #ffffff;
      --muted: #999;
      --danger: #ff6b6b;
      --mono: 'DM Mono', monospace;
      --serif: 'Fraunces', serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      padding: 48px 32px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 48px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
    }

    h1 { font-family: var(--serif); font-weight: 300; font-size: 2.8rem; letter-spacing: -0.02em; line-height: 1; }
    h1 em { font-style: italic; color: var(--accent); }
    .meta { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; }

    .controls { display: flex; gap: 12px; margin-bottom: 36px; align-items: center; }
    .controls input {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      font-family: var(--mono); font-size: 0.8rem; padding: 8px 14px; outline: none; transition: border-color 0.2s;
    }
    .controls input:focus { border-color: var(--accent); }
    .controls label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

    #state { font-size: 0.8rem; color: var(--muted); padding: 80px 0; text-align: center; letter-spacing: 0.08em; }
    #state.error { color: var(--danger); }

    .timeline { display: flex; flex-direction: column; gap: 2px; }

    .day-block { border: 1px solid var(--border); overflow: hidden; animation: slideIn 0.3s ease both; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .day-header {
      display: grid; grid-template-columns: 220px 1fr auto; align-items: center; gap: 24px;
      padding: 16px 24px; background: var(--surface); cursor: pointer; user-select: none; transition: background 0.15s;
    }
    .day-header:hover { background: #202020; }
    .day-header.today { border-left: 3px solid var(--accent); }

    .date-label { font-family: var(--serif); font-weight: 600; font-size: 1.1rem; letter-spacing: -0.01em; }
    .date-sub { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

    .property-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill { font-size: 0.65rem; padding: 3px 10px; border: 1px solid var(--border); color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }

    .total-badge { font-size: 0.7rem; background: var(--accent); color: #0f0f0f; padding: 4px 10px; font-weight: 500; white-space: nowrap; }

    .day-body { display: none; padding: 0 24px 20px; background: var(--bg); }
    .day-body.open { display: block; }

    .property-section { margin-top: 20px; }

    .property-title {
      font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--accent-dim);
      margin-bottom: 10px; display: flex; align-items: center; gap: 10px;
    }
    .property-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .property-count { font-size: 0.65rem; color: var(--muted); background: var(--surface); border: 1px solid var(--border); padding: 2px 8px; }

    .edit-btn {
      font-family: var(--mono); font-size: 0.6rem; padding: 3px 10px; background: transparent;
      border: 1px solid var(--border); color: var(--muted); cursor: pointer;
      text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.15s;
    }
    .edit-btn:hover { border-color: var(--accent); color: var(--accent); }

    .cleaners-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .cleaner-tag { font-size: 0.65rem; padding: 3px 10px; background: #1e2a0e; border: 1px solid var(--accent-dim); color: var(--accent); letter-spacing: 0.06em; }
    .no-cleaner { font-size: 0.65rem; color: var(--danger); letter-spacing: 0.06em; }

    table { width: 100%; border-collapse: collapse; font-size: 0.72rem; }
    th { text-align: left; padding: 6px 12px; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); border-bottom: 1px solid var(--border); font-weight: 400; }
    td { padding: 8px 12px; border-bottom: 1px solid #1a1a1a; color: #e0e0e0; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #151515; }
    .code { color: var(--accent); letter-spacing: 0.05em; }
    .listing-cell { color: #aaa; font-size: 0.68rem; }

    .unassigned-section { margin-top: 16px; padding: 10px 14px; border: 1px dashed #3a2020; background: #1a1010; }
    .unassigned-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--danger); margin-bottom: 6px; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }

    .modal { background: var(--surface); border: 1px solid var(--border); padding: 32px; width: 480px; max-width: 95vw; animation: slideIn 0.2s ease; }

    .modal h2 { font-family: var(--serif); font-weight: 300; font-size: 1.4rem; margin-bottom: 6px; }
    .modal-sub { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 24px; }

    .form-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .form-row label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }
    .form-row select,
    .form-row input[type="text"],
    .form-row input[type="number"] {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      font-family: var(--mono); font-size: 0.8rem; padding: 9px 12px; outline: none; width: 100%; transition: border-color 0.2s;
    }
    .form-row select:focus, .form-row input:focus { border-color: var(--accent); }
    .form-row select option { background: #1a1a1a; }

    .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }

    .modal-bookings { padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); font-size: 0.7rem; color: var(--muted); max-height: 80px; overflow-y: auto; }
    .modal-bookings span { display: inline-block; margin-right: 10px; color: var(--accent); }

    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
    .btn { font-family: var(--mono); font-size: 0.72rem; padding: 9px 20px; border: 1px solid var(--border); cursor: pointer; letter-spacing: 0.08em; text-transform: uppercase; transition: all 0.15s; }
    .btn-cancel { background: transparent; color: var(--muted); }
    .btn-cancel:hover { border-color: var(--muted); color: var(--text); }
    .btn-save { background: var(--accent); color: #0f0f0f; border-color: var(--accent); font-weight: 500; }
    .btn-save:hover { background: #d9ff55; }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

    .modal-feedback { font-size: 0.7rem; margin-top: 12px; text-align: right; min-height: 18px; }
    .modal-feedback.success { color: var(--accent); }
    .modal-feedback.error { color: var(--danger); }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Checkout <em>Schedule</em></h1>
    <p class="meta" style="margin-top:8px">All upcoming &amp; past checkouts by property</p>
  </div>
  <div class="meta" id="last-updated"></div>
</header>

<div class="controls">
  <label for="filter-date">Filter date</label>
  <input type="date" id="filter-date" />
  <label for="filter-property">Property</label>
  <input type="text" id="filter-property" placeholder="e.g. Pilrig" style="width:180px" />
</div>

<div id="state">Loading checkouts...</div>
<div class="timeline" id="timeline"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>Assign Cleaner</h2>
    <p class="modal-sub" id="modal-sub"></p>
    <div class="form-row">
      <label>Cleaner</label>
      <select id="modal-cleaner"><option value="">Loading...</option></select>
    </div>
    <div class="form-row">
      <label>Bookings included</label>
      <div class="modal-bookings" id="modal-bookings"></div>
    </div>
    <div class="time-row">
      <div class="form-row">
        <label>Hours</label>
        <input type="number" id="modal-hours" min="0" max="23" value="2" />
      </div>
      <div class="form-row">
        <label>Minutes</label>
        <input type="number" id="modal-minutes" min="0" max="59" value="0" />
      </div>
    </div>
    <div class="form-row">
      <label>Notes (optional)</label>
      <input type="text" id="modal-notes" placeholder="e.g. Deep clean after checkout" />
    </div>
    <div class="modal-feedback" id="modal-feedback"></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" id="btn-cancel">Cancel</button>
      <button class="btn btn-save" id="modal-save">Assign</button>
    </div>
  </div>
</div>

<script>
  var API = 'https://booking-management-2-3851.onrender.com';
  var today = new Date().toISOString().slice(0, 10);
  var allData = [];
  var modalContext = null;

  function fmt(iso) {
    var d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'long', year: 'numeric' });
  }

  function load() {
    var stateEl = document.getElementById('state');
    stateEl.style.display = 'block';
    stateEl.textContent = 'Loading checkouts...';
    fetch(API + '/bookings/checkout/')
      .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function(data) {
        allData = data;
        document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString('en-GB');
        render();
      })
      .catch(function(e) {
        stateEl.className = 'error';
        stateEl.textContent = 'Could not connect to API - ' + e.message;
      });
  }

  function loadCleaners() {
    fetch(API + '/cleaners/')
      .then(function(res) { return res.json(); })
      .then(function(data) {
        var sel = document.getElementById('modal-cleaner');
        sel.innerHTML = data.length
          ? data.map(function(c) { return '<option value="' + c.id + '">' + c.name + '</option>'; }).join('')
          : '<option value="">No cleaners found</option>';
      })
      .catch(function() {
        document.getElementById('modal-cleaner').innerHTML = '<option value="">Could not load cleaners</option>';
      });
  }

  function render() {
    var stateEl = document.getElementById('state');
    var timeline = document.getElementById('timeline');
    var filterDate = document.getElementById('filter-date').value;
    var filterProp = document.getElementById('filter-property').value.toLowerCase();

    var data = allData.slice();
    if (filterDate) data = data.filter(function(d) { return d.checkout_date === filterDate; });
    if (filterProp) data = data.filter(function(d) {
      return d.by_property.some(function(p) { return p.property.toLowerCase().indexOf(filterProp) !== -1; });
    });

    timeline.innerHTML = '';

    if (!data.length) {
      stateEl.style.display = 'block';
      stateEl.className = '';
      stateEl.textContent = 'No checkouts match the current filter.';
      return;
    }

    stateEl.style.display = 'none';

    data.forEach(function(day, i) {
      var isToday = day.checkout_date === today;
      var block = document.createElement('div');
      block.className = 'day-block';
      block.style.animationDelay = (i * 40) + 'ms';

      var pillsHTML = day.by_property.map(function(p) {
        return '<span class="pill">' + p.property + ' x' + p.count + '</span>';
      }).join('');

      var header = document.createElement('div');
      header.className = 'day-header' + (isToday ? ' today' : '');
      header.innerHTML =
        '<div>' +
          '<div class="date-label">' + fmt(day.checkout_date) + '</div>' +
          '<div class="date-sub">' + (isToday ? '- today' : '') + '</div>' +
        '</div>' +
        '<div class="property-pills">' + pillsHTML + '</div>' +
        '<div class="total-badge">' + day.total + ' checkout' + (day.total !== 1 ? 's' : '') + '</div>';

      var body = document.createElement('div');
      body.className = 'day-body' + (isToday ? ' open' : '');

      var bodyHTML = '';

      day.by_property.forEach(function(prop) {
        var propCleaners = [];
        prop.bookings.forEach(function(b) {
          (b.cleaners || []).forEach(function(c) {
            if (propCleaners.indexOf(c) === -1) propCleaners.push(c);
          });
        });

        var cleanersHTML = propCleaners.length
          ? propCleaners.map(function(c) { return '<span class="cleaner-tag">&#x2713; ' + c + '</span>'; }).join('')
          : '<span class="no-cleaner">&#x26A0; No cleaner assigned</span>';

        var rowsHTML = prop.bookings.map(function(b) {
          var cleanerCell = (b.cleaners && b.cleaners.length)
            ? b.cleaners.join(', ')
            : '<span style="color:var(--danger);font-size:0.65rem">unassigned</span>';
          return '<tr>' +
            '<td class="code">' + b.confirmation_code + '</td>' +
            '<td class="listing-cell">' + (b.listing || '-') + '</td>' +
            '<td>' + cleanerCell + '</td>' +
            '</tr>';
        }).join('');

        var bookingsData = encodeURIComponent(JSON.stringify(prop.bookings));

        bodyHTML +=
          '<div class="property-section">' +
            '<div class="property-title">' +
              prop.property +
              '<span class="property-count">' + prop.count + ' room' + (prop.count !== 1 ? 's' : '') + '</span>' +
              '<button class="edit-btn" data-date="' + day.checkout_date + '" data-bookings="' + bookingsData + '">+ Assign cleaner</button>' +
            '</div>' +
            '<div class="cleaners-row">' + cleanersHTML + '</div>' +
            '<table>' +
              '<thead><tr><th>Code</th><th>Room</th><th>Cleaners</th></tr></thead>' +
              '<tbody>' + rowsHTML + '</tbody>' +
            '</table>' +
          '</div>';
      });

      if (day.unassigned && day.unassigned.length) {
        bodyHTML +=
          '<div class="unassigned-section">' +
            '<div class="unassigned-label">&#x26A0; ' + day.unassigned.length + ' booking' + (day.unassigned.length !== 1 ? 's' : '') + ' with no property assigned</div>' +
            day.unassigned.map(function(b) { return '<span style="font-size:0.7rem;color:#aaa;margin-right:12px">' + b.confirmation_code + '</span>'; }).join('') +
          '</div>';
      }

      body.innerHTML = bodyHTML;

      body.querySelectorAll('.edit-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          var bookings = JSON.parse(decodeURIComponent(btn.dataset.bookings));
          var propName = btn.closest('.property-section').querySelector('.property-title').childNodes[0].textContent.trim();
          openModal(btn.dataset.date, propName, bookings);
        });
      });

      header.addEventListener('click', function() { body.classList.toggle('open'); });

      block.appendChild(header);
      block.appendChild(body);
      timeline.appendChild(block);
    });
  }

  function openModal(date, property, bookings) {
    modalContext = { date: date, codes: bookings.map(function(b) { return b.confirmation_code; }) };
    document.getElementById('modal-sub').textContent = property + ' - ' + fmt(date);
    document.getElementById('modal-bookings').innerHTML = bookings.map(function(b) {
      return '<span>' + b.confirmation_code + '</span>';
    }).join('');
    document.getElementById('modal-feedback').textContent = '';
    document.getElementById('modal-feedback').className = 'modal-feedback';
    document.getElementById('modal-save').disabled = false;
    document.getElementById('modal-notes').value = '';
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    modalContext = null;
  }

  function saveSession() {
    if (!modalContext) return;
    var cleanerId = parseInt(document.getElementById('modal-cleaner').value);
    var hours = parseInt(document.getElementById('modal-hours').value) || 0;
    var minutes = parseInt(document.getElementById('modal-minutes').value) || 0;
    var notes = document.getElementById('modal-notes').value.trim();
    var feedback = document.getElementById('modal-feedback');
    var saveBtn = document.getElementById('modal-save');

    if (!cleanerId) {
      feedback.textContent = 'Please select a cleaner.';
      feedback.className = 'modal-feedback error';
      return;
    }

    saveBtn.disabled = true;
    feedback.textContent = 'Saving...';
    feedback.className = 'modal-feedback';

    fetch(API + '/cleaning-sessions/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        cleaner_id: cleanerId,
        clean_date: modalContext.date,
        hours: hours,
        minutes: minutes,
        notes: notes || null,
        confirmation_codes: modalContext.codes
      })
    })
    .then(function(res) {
      if (!res.ok) return res.json().then(function(e) { throw new Error(e.detail || 'HTTP ' + res.status); });
      return res.json();
    })
    .then(function() {
      feedback.textContent = 'Cleaner assigned successfully';
      feedback.className = 'modal-feedback success';
      setTimeout(function() { closeModal(); load(); }, 1000);
    })
    .catch(function(e) {
      feedback.textContent = 'Error: ' + e.message;
      feedback.className = 'modal-feedback error';
      saveBtn.disabled = false;
    });
  }

  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('filter-date').addEventListener('input', render);
    document.getElementById('filter-property').addEventListener('input', render);
    document.getElementById('modal-overlay').addEventListener('click', function(e) {
      if (e.target === e.currentTarget) closeModal();
    });
    document.getElementById('btn-cancel').addEventListener('click', closeModal);
    document.getElementById('modal-save').addEventListener('click', saveSession);
    load();
    loadCleaners();
  });
</script>
</body>
</html>
