<!DOCTYPE html>
<html lang="en">
<head>
  <title>Cleaner Sessions</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>
<body>

<div class="container" style="margin-top:30px; margin-bottom:30px;">
  <div class="page-header">
    <h2>Cleaner Sessions <small>Fetch cleaner profile and sessions</small></h2>
  </div>

  <div id="alerts"></div>

  <div class="panel panel-default">
    <div class="panel-heading"><strong>Filters</strong></div>
    <div class="panel-body">
      <div class="row">
        <div class="col-sm-4">
          <label for="cleaner">Select Cleaner</label>
          <select id="cleaner" class="form-control">
            <option value="">Loading cleaners...</option>
          </select>
        </div>
        <div class="col-sm-3">
          <label for="start_date">Start Date</label>
          <input type="date" id="start_date" class="form-control">
        </div>
        <div class="col-sm-3">
          <label for="end_date">End Date</label>
          <input type="date" id="end_date" class="form-control">
        </div>
        <div class="col-sm-2" style="padding-top:25px;">
          <button id="fetch-btn" class="btn btn-primary btn-block">Fetch Sessions</button>
        </div>
      </div>
    </div>
  </div>

  <div class="panel panel-info" id="cleaner-panel" style="display:none;">
    <div class="panel-heading"><strong>Cleaner Info</strong></div>
    <div class="panel-body" id="cleaner-info"></div>
  </div>

  <div class="panel panel-default">
    <div class="panel-heading"><strong>Sessions</strong></div>
    <div class="panel-body" id="sessions">
      <p class="text-muted" style="margin:0;">Choose a cleaner and click <strong>Fetch Sessions</strong>.</p>
    </div>
  </div>
</div>

<script>
  var API = 'https://booking-management-2-3851.onrender.com';

  function escapeHtml(text) {
    return String(text == null ? '' : text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function showError(message) {
    document.getElementById('alerts').innerHTML =
      '<div class="alert alert-danger"><strong>Error:</strong> ' + escapeHtml(message) + '</div>';
  }

  function clearError() {
    document.getElementById('alerts').innerHTML = '';
  }

  function setLoadingCleaners() {
    document.getElementById('cleaner').innerHTML = '<option value="">Loading cleaners...</option>';
  }

  function renderCleanerOptions(cleaners) {
    var select = document.getElementById('cleaner');

    if (!cleaners || cleaners.length === 0) {
      select.innerHTML = '<option value="">No cleaners found</option>';
      return;
    }

    var options = cleaners.map(function(item) {
      var id = item.cleaner_id || item.id;
      var name = item.cleaner_name || item.name || ('Cleaner #' + id);
      return '<option value="' + escapeHtml(id) + '">' + escapeHtml(name) + '</option>';
    }).join('');

    select.innerHTML = options;
  }

  function loadCleaners() {
    clearError();
    setLoadingCleaners();

    return fetch(API + '/cleaners/')
      .then(function(response) {
        if (!response.ok) {
          throw new Error('Failed to load cleaners (HTTP ' + response.status + ')');
        }
        return response.json();
      })
      .then(function(data) {
        renderCleanerOptions(data || []);
      })
      .catch(function(error) {
        document.getElementById('cleaner').innerHTML = '<option value="">Failed to load cleaners</option>';
        showError(error.message || 'Could not load cleaners');
      });
  }

  function fetchSessions() {
    clearError();

    var cleanerId = document.getElementById('cleaner').value;
    var startDate = document.getElementById('start_date').value;
    var endDate = document.getElementById('end_date').value;

    if (!cleanerId) {
      showError('Please select a cleaner first.');
      return;
    }

    var url = API + '/cleaners/' + encodeURIComponent(cleanerId) + '/sessions';
    var params = new URLSearchParams();

    if (startDate) {
      params.append('start_date', startDate);
    }

    if (endDate) {
      params.append('end_date', endDate);
    }

    if (params.toString()) {
      url += '?' + params.toString();
    }

    fetch(url)
      .then(function(response) {
        if (!response.ok) {
          throw new Error('Failed to fetch sessions (HTTP ' + response.status + ')');
        }
        return response.json();
      })
      .then(function(data) {
        renderCleaner(data);
        renderSessions(data.sessions, data.rate);
      })
      .catch(function(error) {
        document.getElementById('cleaner-panel').style.display = 'none';
        document.getElementById('sessions').innerHTML = '<p class="text-danger" style="margin:0;">Could not load sessions.</p>';
        showError(error.message || 'Could not fetch sessions');
      });
  }

  function renderCleaner(cleaner) {
    document.getElementById('cleaner-panel').style.display = 'block';
    document.getElementById('cleaner-info').innerHTML =
      '<div class="row">' +
        '<div class="col-sm-6"><p><strong>ID:</strong> ' + escapeHtml(cleaner.id) + '</p></div>' +
        '<div class="col-sm-6"><p><strong>Name:</strong> ' + escapeHtml(cleaner.name) + '</p></div>' +
      '</div>' +
      '<div class="row">' +
        '<div class="col-sm-6"><p><strong>Email:</strong> ' + escapeHtml(cleaner.email || '') + '</p></div>' +
        '<div class="col-sm-6"><p><strong>Phone:</strong> ' + escapeHtml(cleaner.phone || '') + '</p></div>' +
      '</div>' +
      '<p style="margin-bottom:0;"><strong>Rate:</strong> £' + escapeHtml(cleaner.rate || 0) + '/hour</p>';
  }

  function renderSessions(sessions, rate) {
    var container = document.getElementById('sessions');

    if (!sessions || sessions.length === 0) {
      container.innerHTML = '<p class="text-muted" style="margin:0;">No sessions found.</p>';
      return;
    }

    var totalMinutes = 0;

    var rows = sessions.map(function(session) {
      totalMinutes += (session.hours * 60) + session.minutes;
      var bookingCodes = (session.session_bookings || []).map(function(booking) {
        return escapeHtml(booking.confirmation_code);
      }).join('<br>');

      return '<tr>' +
        '<td>' + escapeHtml(session.id) + '</td>' +
        '<td>' + escapeHtml(session.clean_date) + '</td>' +
        '<td>' + escapeHtml(session.hours) + '</td>' +
        '<td>' + escapeHtml(session.minutes) + '</td>' +
        '<td>' + escapeHtml(session.notes || '') + '</td>' +
        '<td>' + bookingCodes + '</td>' +
      '</tr>';
    }).join('');

    var totalHours = totalMinutes / 60;
    var totalCost = totalHours * Number(rate || 0);

    container.innerHTML =
      '<div class="table-responsive">' +
        '<table class="table table-striped table-bordered table-condensed" style="margin-bottom:10px;">' +
          '<thead>' +
            '<tr>' +
              '<th>Session ID</th>' +
              '<th>Date</th>' +
              '<th>Hours</th>' +
              '<th>Minutes</th>' +
              '<th>Notes</th>' +
              '<th>Booking Codes</th>' +
            '</tr>' +
          '</thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
      '</div>' +
      '<p><strong>Total Hours:</strong> ' + totalHours.toFixed(2) + '</p>' +
      '<p><strong>Hourly Rate:</strong> £' + escapeHtml(rate || 0) + '</p>' +
      '<p style="margin-bottom:0;"><strong>Total Cost:</strong> £' + totalCost.toFixed(2) + '</p>';
  }

  document.getElementById('fetch-btn').addEventListener('click', fetchSessions);
  loadCleaners();
</script>

</body>
</html>
